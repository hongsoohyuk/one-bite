name: Deploy to AWS

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'docker-compose.prod.yml'
      - 'infra/nginx/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/server
  AWS_REGION: ap-northeast-2
  EC2_INSTANCE_ID: i-00fedbf43668c090b

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to EC2 via SSM
    runs-on: ubuntu-latest
    needs: build-and-push

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM Run Command
        run: |
          set -euo pipefail

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "deploy ${{ github.sha }}" \
            --parameters commands='[
              "set -eux",
              "cd /opt/onebite",
              "sudo -u ec2-user git pull origin main",
              "echo \"${{ secrets.GITHUB_TOKEN }}\" | sudo -u ec2-user docker login ghcr.io -u ${{ github.actor }} --password-stdin",
              "sudo -u ec2-user docker compose -f docker-compose.prod.yml pull server",
              "sudo -u ec2-user docker compose -f docker-compose.prod.yml up -d",
              "sudo -u ec2-user docker image prune -f"
            ]' \
            --output text \
            --query "Command.CommandId")

          echo "Command ID: $COMMAND_ID"

          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")

            echo "Poll $i: $STATUS"

            case "$STATUS" in
              Success)
                echo "=== stdout ==="
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$EC2_INSTANCE_ID" \
                  --query "StandardOutputContent" --output text
                exit 0
                ;;
              Failed|Cancelled|TimedOut)
                echo "=== stderr ==="
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$EC2_INSTANCE_ID" \
                  --query "StandardErrorContent" --output text
                echo "=== stdout ==="
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$EC2_INSTANCE_ID" \
                  --query "StandardOutputContent" --output text
                exit 1
                ;;
            esac

            sleep 10
          done

          echo "SSM command timed out"
          exit 1

      - name: Health check
        run: |
          sleep 30
          for i in $(seq 1 10); do
            if curl -sf "http://${{ secrets.EC2_HOST }}/actuator/health"; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
          echo "Health check failed after 10 attempts"
          exit 1
